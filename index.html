    function hexToRgb(hex) {
      return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }

    function lerpColor(c1, c2, t) {
      const a = hexToRgb(c1), b = hexToRgb(c2);
      const r = Math.round(a.r + (b.r - a.r) * t);
      const g = Math.round(a.g + (b.g - a.g) * t);
      const bl = Math.round(a.b + (b.b - a.b) * t);
      return '#' + [r,g,bl].map(v => Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0')).join('');
    }

    function pickColorsFromPalette(p) {
      const all = [p.Vibrant, p.LightVibrant, p.DarkVibrant, p.Muted, p.LightMuted, p.DarkMuted].filter(Boolean);
      if (all.length === 0) return null;
      const colors = all.map(s => s.hex);
      // warm vs cool: r - b
      const scored = all.map(s => ({ hex: s.hex, warmth: s.rgb ? (s.rgb[0] - s.rgb[2]) : 0 }));
      const warmest = scored.reduce((a, b) => a.warmth > b.warmth ? a : b);
      const coolest  = scored.reduce((a, b) => a.warmth < b.warmth ? a : b);
      return { color1: warmest.hex, color2: coolest.hex, palette: colors };
    }

    function shiftColor(hex, n) {
      const { r, g, b } = hexToRgb(hex);
      const c = v => Math.min(255, Math.max(0, v + n));
      return `rgb(${c(r)},${c(g)},${c(b)})`;
    }

    function getTextColor(hex) {
      try {
        const { r, g, b } = hexToRgb(hex);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.52 ? '#1c1917' : '#faf9f7';
      } catch { return '#1c1917'; }
    }

    function measureLines(ctx, text, maxW) {
      if (!text.trim()) return [];
      const words = text.split(' '); let line = '', lines = [];
      for (const w of words) {
        const c = line ? line + ' ' + w : w;
        if (ctx.measureText(c).width > maxW && line) { lines.push(line); line = w; } else line = c;
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawLines(ctx, lines, x, cy, lh) {
      const sy = cy - lines.length * lh / 2 + lh / 2;
      lines.forEach((l, i) => ctx.fillText(l, x, sy + i * lh));
      return sy + lines.length * lh - lh / 2;
    }

    function addGrain(ctx, x, y, w, h, intensity) {
      if (!intensity) return;
      try {
        const d = ctx.getImageData(x, y, w, h), px = d.data;
        for (let i = 0; i < px.length; i += 4) {
          const n = (Math.random() - 0.5) * intensity;
          px[i]   = Math.min(255, Math.max(0, px[i]   + n));
          px[i+1] = Math.min(255, Math.max(0, px[i+1] + n));
          px[i+2] = Math.min(255, Math.max(0, px[i+2] + n));
        }
        ctx.putImageData(d, x, y);
      } catch(e) {}
    }

    function drawGradBlock(ctx, color1, color2, ratio, x, y, w, h, grain) {
      const g = ctx.createLinearGradient(x, y, x, y + h);
      // ratio: 0 = pure color1, 1 = pure color2
      const bottomColor = lerpColor(color1, color2, ratio);
      g.addColorStop(0, color1);
      g.addColorStop(1, bottomColor);
      ctx.fillStyle = g;
      ctx.fillRect(x, y, w, h);
      addGrain(ctx, x, y, w, h, grain);
    }

    function ColorPicker({ color, onChange, onRandom, palette, label, randomLabel }) {
      return (
        <div className="flex items-start gap-3">

                style={{ width: 'calc(100% + 8px)', height: 'calc(100% + 8px)' }} />
              <div className="absolute inset-0 pointer-events-none" style={{ background: color }} />
            </div>
            <span style={{fontSize:'12px', color:'#2D2D2D', fontFamily:'"Courier Prime", monospace', letterSpacing:'0.05em'}}>{color.toUpperCase()}</span>
            {label && <span style={{fontSize:'11px', color:'#B0B0B0'}}>{label}</span>}
          </div>
          {onRandom && (
            <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
              <button onClick={onRandom}
                style={{fontSize:'11px', color:'#7A7A7A', background:'none', border:'none', cursor:'pointer', transition:'color 0.2s'}}
                onMouseEnter={e => e.target.style.color='#F26451'}
                onMouseLeave={e => e.target.style.color='#7A7A7A'}>
                {randomLabel || '↻ RANDOM'}
              </button>
              {palette && palette.length > 0 && (
                <div className="flex gap-1">
                  {palette.map((c, i) => (
                    <button key={i} onClick={() => onChange(c)} title={c}
                      style={{ width:'18px', height:'18px', flexShrink:0, background:c, borderRadius:'6px', border: color === c ? '2px solid #F26451' : '2px solid transparent', cursor:'pointer', transition:'all 0.2s', transform: color === c ? 'scale(1.1)' : 'scale(1)' }}
                      onMouseEnter={e => { if (color !== c) e.target.style.borderColor = '#D0CDC8'; }}
                      onMouseLeave={e => { if (color !== c) e.target.style.borderColor = 'transparent'; }} />
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function Section({ label, value, children }) {
      return (
        <div style={{ background: '#FAFAF8', borderRadius: '14px', padding: '11px 14px', boxShadow: '0 1px 2px rgba(0,0,0,0.03)' }}>
          <div className="flex items-baseline justify-between mb-1.5">
            <span style={{ fontSize: '10px', fontWeight: 600, color: '#7A7A7A', letterSpacing: '0.1em', textTransform: 'uppercase' }}>{label}</span>
            {value && <span style={{ fontSize: '11px', color: '#B0B0B0' }}>{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function App() {
      const [lang, setLang]           = useState('en');
      const [showAbout, setShowAbout] = useState(false);
      const [showCoffee, setShowCoffee] = useState(false);
      const [showExportSuccess, setShowExportSuccess] = useState(false);
      const [lastExportUrl, setLastExportUrl] = useState(null);
      const [splashStage, setSplashStage] = useState('intro'); // 'intro' | 'cta' | 'done'
      const [splashExiting, setSplashExiting] = useState(false);

      const handleSplashDismiss = useCallback(() => {
        if (splashStage === 'cta' && !splashExiting) {
          setSplashExiting(true);
          setTimeout(() => setSplashStage('done'), 1000);
        }
      }, [splashStage, splashExiting]);

      useEffect(() => {
        const t1 = setTimeout(() => setSplashStage('cta'), 2000);
        return () => clearTimeout(t1);
      }, []);

      const t = T[lang];
      const AUTO_DATE = lang === 'en' ? AUTO_DATE_ISO : AUTO_DATE_ISO;

      const [image, setImage]         = useState(null);
      const [title, setTitle]         = useState('My colors, My moments');
      const [split, setSplit]         = useState(0.5);
      const [fontSize, setFontSize]   = useState(40);
      const [bgColor1, setBgColor1] = useState('#c9bba8');
      const [bgColor2, setBgColor2] = useState('#8b9dc3');
      const [textColor, setTextColor] = useState('#1c1917');
      const [colorRatio, setColorRatio] = useState(0.5);
      const [palette, setPalette]     = useState([]);
      const [pan, setPan]             = useState({ x: 0, y: 0 });
      const [dateText, setDateText]   = useState(AUTO_DATE_ISO);
      const [sourceType, setSourceType] = useState(null);
      const [isExporting, setIsExporting] = useState(false);
      const [showPanHint, setShowPanHint] = useState(false);
      const hintTimer = useRef(null);
      const [dropHover, setDropHover] = useState(false);
      const [fontsReady, setFontsReady] = useState(false);

      const [activeTab, setActiveTab] = useState('photo');
      const [savedImgUrl, setSavedImgUrl] = useState(null);
      const [photoZoom, setPhotoZoom] = useState(1);
      const [rotation, setRotation]   = useState(0);
      const [ambientColors, setAmbientColors] = useState(null);

      const canvasRef = useRef(null), fileRef = useRef(null), wrapRef = useRef(null), sampleRef = useRef(null);
      const ps = useRef({ on: false, sx: 0, sy: 0, spx: 0, spy: 0, moved: false, inImg: false, dragActive: false });
      const animRef = useRef(null);
      const animIdRef = useRef(0);
      const longPressTimer = useRef(null);
      const touches = useRef({});
      const lastPinch = useRef(null);
      const videoElRef = useRef(null); // keeps video element in DOM for iOS canvas drawImage

      const [viewW, setViewW] = useState(window.innerWidth);
      const [viewH, setViewH] = useState(window.innerHeight);
      useEffect(() => {
        const handler = () => { setViewW(window.innerWidth); setViewH(window.innerHeight); };
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);
      const isMobile = viewW < 640;
      // Fixed dark workspace height: 57% of usable viewport (below ~54px header)
      const darkAreaH = isMobile ? Math.max(220, Math.round((viewH - 54) * 0.57)) : 0;
      // Card occupies 83% of dark area height — slightly larger default, visible dark border
      const desktopPW = Math.min(380, Math.round((viewW - 220) * 0.37));
      const PW = isMobile
        ? Math.round(darkAreaH * 0.83 * CANVAS_W / CANVAS_H)
        : desktopPW;
      const PH = Math.round(PW / CANVAS_W * CANVAS_H);

      useEffect(() => { document.fonts.ready.then(() => setFontsReady(true)); }, []);
      useEffect(() => {
        const img = new Image();
        img.onload = async () => {
          sampleRef.current = img;
          setImage(img);
          setSourceType('image');
          try {
            const p = await Vibrant.from(img).getPalette();
            const r = pickColorsFromPalette(p);
            if (r) {
              setPalette(r.palette);
              setBgColor1(r.color1);
              setBgColor2(r.color2);
            }
          } catch (e) {}
          draw();
        };
        img.src = 'sample2.jpg';
      }, []);

      useEffect(() => {
        if (palette.length >= 2) {
          const hexes = palette;
          const scored = hexes.map(h => {
            const { r, g, b } = hexToRgb(h);
            return { hex: h, warmth: r - b };
          });
          const warm = scored.reduce((a, b) => a.warmth > b.warmth ? a : b).hex;
          const cool = scored.reduce((a, b) => a.warmth < b.warmth ? a : b).hex;
          setAmbientColors({ warm, cool });
        } else if (palette.length === 1) {
          setAmbientColors({ warm: palette[0], cool: palette[0] });
        } else {
          setAmbientColors(null);
        }
      }, [palette]);

      const draw = useCallback(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const topH = Math.round(CANVAS_H * split), botH = CANVAS_H - topH;
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

        if (image) {
          drawGradBlock(ctx, bgColor1, bgColor2, colorRatio, 0, 0, CANVAS_W, topH, 0);
          // videoWidth/videoHeight for <video>, naturalWidth for <img>
          const iw = image.videoWidth  || image.naturalWidth  || image.width;
          const ih = image.videoHeight || image.naturalHeight || image.height;
          const ia = iw / ih, ta = CANVAS_W / botH;
          let baseW, baseH;
          if (ia > ta) { baseH = botH; baseW = baseH * ia; }
          else          { baseW = CANVAS_W; baseH = baseW / ia; }
          const dw = baseW * photoZoom, dh = baseH * photoZoom;
          const dx = (CANVAS_W - dw) / 2 + pan.x;
          const dy = topH + (botH - dh) / 2 + pan.y;
          const cx = CANVAS_W / 2, cy = topH + botH / 2;
          ctx.save();
          ctx.beginPath(); ctx.rect(0, topH, CANVAS_W, botH); ctx.clip();
          ctx.translate(cx, cy); ctx.rotate(rotation * Math.PI / 180); ctx.translate(-cx, -cy);
          ctx.drawImage(image, dx, dy, dw, dh);
          ctx.restore();
        } else if (sampleRef.current) {
          const si = sampleRef.current;
          const cw = CANVAS_W, ch = CANVAS_H;
          const ia = si.width / si.height, ta = cw / ch;
          let dw, dh;
          if (ia > ta) { dh = ch; dw = dh * ia; }
          else         { dw = cw; dh = dw / ia; }
          const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
          ctx.drawImage(si, dx, dy, dw, dh);
        } else {
          drawGradBlock(ctx, bgColor1, bgColor2, colorRatio, 0, 0, CANVAS_W, topH, 0);
          ctx.fillStyle = '#b8afa6';
          ctx.fillRect(0, topH, CANVAS_W, botH);
          ctx.fillStyle = 'rgba(28,25,23,0.4)';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = '24px "Playfair Display","KaiTi","STKaiti",serif';
          ctx.fillText(t.uploadPrompt, CANVAS_W / 2, topH + botH / 2);
        }

        const tc = textColor;
        ctx.fillStyle = tc; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `400 ${fontSize}px "Playfair Display","KaiTi","STKaiti",serif`;
        if ('letterSpacing' in ctx) ctx.letterSpacing = '6px';
        const lines = measureLines(ctx, title || ' ', CANVAS_W * 0.7);

      const load = useCallback(async (file) => {

        setBgColor2(palette[Math.max(i, j)]);

      useEffect(() => {

        // Helper to draw one frame to the export canvas with animation params
        var drawExportFrame = function(ctx, w, h, zoom, px, py) {

          var btm = drawLines(ctx, lines, w / 2, topH * 0.46, fontSize * 1.5);

            ctx.strokeStyle = tc; ctx.globalAlpha = 0.3; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(w / 2 - 40, ry); ctx.lineTo(w / 2 + 40, ry); ctx.stroke();
            ctx.globalAlpha = 1;
            var dfs = Math.max(14, Math.round(fontSize * 0.7));

            <div style={{ position:'absolute', bottom:'-10%', left:'-15%', width:'50vw', height:'50vw', maxWidth:'400px', maxHeight:'400px', borderRadius:'50%', background:'radial-gradient(circle, rgba(140,140,180,0.25) 0%, transparent 70%)', animation:'splashFloat 10s ease-in-out infinite 1s' }} />

                        <Section label={t.fontSize} value={`${fontSize}px`}>
                          <input type="range" min="12" max="72" step="1" value={fontSize}
                            onChange={e => setFontSize(parseInt(e.target.value))}
                            style={{background: `linear-gradient(to right, #F26451 0%, #F26451 ${((fontSize - 12) / 60) * 100}%, #E8E5E0 ${((fontSize - 12) / 60) * 100}%, #E8E5E0 100%)`}} />
                        </Section>
                      )}
                      {activeTab === 'textColor' && (
                        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                          <div className="relative" style={{width:'34px', height:'26px', borderRadius:'8px', border:'1.5px solid #E0E0E0', overflow:'hidden', flexShrink:0}}>
                            <input type="color" value={textColor} onChange={e => setTextColor(e.target.value)}
                              className="absolute -inset-1 opacity-0 cursor-pointer" style={{width:'calc(100%+8px)', height:'calc(100%+8px)'}} />
                            <div className="absolute inset-0 pointer-events-none" style={{background: textColor}} />
                          </div>
                          <span style={{fontSize:'12px', color:'#2D2D2D', fontFamily:'"Courier Prime", monospace', letterSpacing:'0.05em'}}>{textColor.toUpperCase()}</span>
                        </div>
                      )}
                      {activeTab === 'color' && (
                        <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                          <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                            <div className="relative" style={{width:'34px', height:'26px', borderRadius:'8px', border:'1.5px solid #E0E0E0', overflow:'hidden', flexShrink:0}}>
                              <input type="color" value={bgColor1} onChange={e => setBgColor1(e.target.value)}
                                className="absolute -inset-1 opacity-0 cursor-pointer" style={{width:'calc(100%+8px)', height:'calc(100%+8px)'}} />
                              <div className="absolute inset-0 pointer-events-none" style={{background: bgColor1}} />
                            </div>
                            <input type="range" min="0" max="1" step="0.01" value={colorRatio}
                              onChange={e => setColorRatio(parseFloat(e.target.value))}
                              style={{flex:1, height:'6px', background: `linear-gradient(to right, ${bgColor1}, ${bgColor2})`, borderRadius:'3px'}} />
                            <div className="relative" style={{width:'34px', height:'26px', borderRadius:'8px', border:'1.5px solid #E0E0E0', overflow:'hidden', flexShrink:0}}>
                              <input type="color" value={bgColor2} onChange={e => setBgColor2(e.target.value)}
                                className="absolute -inset-1 opacity-0 cursor-pointer" style={{width:'calc(100%+8px)', height:'calc(100%+8px)'}} />
                              <div className="absolute inset-0 pointer-events-none" style={{background: bgColor2}} />
                            </div>
                          </div>
                          {palette.length > 0 && (
                            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                              <div style={{display:'flex', gap:'6px', flexWrap:'wrap'}}>
                                {palette.map((c, i) => (
                                  <button key={i} onClick={() => { if (i === 0 || i % 2 === 0) setBgColor1(c); else setBgColor2(c); }} title={c}
                                    style={{width:'22px', height:'22px', flexShrink:0, background:c, borderRadius:'7px', border: (bgColor1 === c || bgColor2 === c) ? '2px solid #F26451' : '2px solid transparent', cursor:'pointer', transition:'all 0.2s'}} />
                                ))}
                              </div>
                              <button onClick={randomFromPalette}
                                style={{fontSize:'11px', color:'#7A7A7A', background:'none', border:'none', cursor:'pointer', whiteSpace:'nowrap'}}>
                                {t.random}
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </>
                );
              })()}
            </div>

            {/* Desktop controls panel */}
            {!isMobile && (
              <div className="no-scrollbar flex-1 flex flex-col gap-2 overflow-y-auto" style={{height: PH, minWidth:'200px'}}>

                {/* Card 1 — Photo */}
                <Section label={t.photo}>
                  <button onClick={() => fileRef.current?.click()}
                    style={{width:'100%', padding:'9px 0', background:'#FFFFFF', border:'1.5px solid #E0E0E0', borderRadius:'13px', color:'#2D2D2D', fontSize:'12px', fontWeight:500, cursor:'pointer', letterSpacing:'0.03em', transition:'all 0.2s'}}
                    onMouseEnter={e => { e.target.style.borderColor='#C0BAB2'; }}
                    onMouseLeave={e => { e.target.style.borderColor='#E0E0E0'; }}>
                    {image ? t.replace : t.upload}
                  </button>
                </Section>

                {/* Card 2 — Title */}
                <Section label={t.title}>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)}
                    style={{width:'100%', border:'1.5px solid #E0E0E0', borderRadius:'13px', outline:'none', padding:'9px 13px', color:'#2D2D2D', fontSize:'13px', fontWeight:400, background:'#FFFFFF', transition:'border-color 0.2s', fontFamily:'inherit', letterSpacing:'0.02em', boxSizing:'border-box'}}
                    onFocus={e => e.target.style.borderColor='#F26451'}
                    onBlur={e => e.target.style.borderColor='#E0E0E0'}
                    placeholder={t.titlePh} />
                </Section>

                {/* Card 3 — Date */}
                <Section label={t.date}>
                  <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                    <input type="date" value={dateText} onChange={e => setDateText(e.target.value)}
                      style={{flex:1, border:'1.5px solid #E0E0E0', borderRadius:'13px', outline:'none', padding:'9px 13px', color:'#2D2D2D', fontSize:'13px', fontWeight:400, background:'#FFFFFF', transition:'border-color 0.2s', fontFamily:'inherit', boxSizing:'border-box'}}
                      onFocus={e => e.target.style.borderColor='#F26451'}
                      onBlur={e => e.target.style.borderColor='#E0E0E0'}
                      placeholder={t.datePh} />
                    <button onClick={() => setDateText(AUTO_DATE)}
                      style={{fontSize:'11px', color:'#7A7A7A', background:'none', border:'none', cursor:'pointer', transition:'color 0.2s', fontWeight:400, whiteSpace:'nowrap', padding:'4px 6px'}}
                      onMouseEnter={e => e.target.style.color='#F26451'}
                      onMouseLeave={e => e.target.style.color='#7A7A7A'}>
                      {t.reset}
                    </button>
                  </div>
                </Section>

                {/* Card 4 — Split Ratio */}
                <Section label={t.split} value={`${Math.round(split * 100)} / ${Math.round((1 - split) * 100)}`}>
                  <input type="range" min="0.2" max="0.75" step="0.01" value={split}
                    onChange={e => setSplit(parseFloat(e.target.value))}
                    style={{background: `linear-gradient(to right, #F26451 0%, #F26451 ${((split - 0.2) / 0.55) * 100}%, #E8E5E0 ${((split - 0.2) / 0.55) * 100}%, #E8E5E0 100%)`}} />
                </Section>

                {/* Card 5 — Font Size */}
                <Section label={t.fontSize} value={`${fontSize}px`}>
                  <input type="range" min="12" max="72" step="1" value={fontSize}
                    onChange={e => setFontSize(parseInt(e.target.value))}
                    style={{background: `linear-gradient(to right, #F26451 0%, #F26451 ${((fontSize - 12) / 60) * 100}%, #E8E5E0 ${((fontSize - 12) / 60) * 100}%, #E8E5E0 100%)`}} />
                </Section>

                {/* Card 5.5 — Text Color */}
                <Section label={t.textColor}>
                  <div className="flex items-center gap-3">
                    <div className="relative flex-shrink-0" style={{width:'28px', height:'20px', borderRadius:'8px', border:'1px solid #E8E5E0', overflow:'hidden'}}>
                      <input type="color" value={textColor} onChange={e => setTextColor(e.target.value)}
                        className="absolute -inset-1 opacity-0 cursor-pointer"
                        style={{ width: 'calc(100% + 8px)', height: 'calc(100% + 8px)' }} />
                      <div className="absolute inset-0 pointer-events-none" style={{ background: textColor }} />
                    </div>
                    <span style={{fontSize:'12px', color:'#2D2D2D', fontFamily:'"Courier Prime", monospace', letterSpacing:'0.05em'}}>{textColor.toUpperCase()}</span>
                  </div>
                </Section>

                {/* Card 6 — Background Color */}
                <Section label={t.bgColor}>
                  <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'10px'}}>
                    <div className="relative" style={{width:'32px', height:'24px', borderRadius:'8px', border:'1.5px solid #E0E0E0', overflow:'hidden', flexShrink:0}}>
                      <input type="color" value={bgColor1} onChange={e => setBgColor1(e.target.value)}
                        className="absolute -inset-1 opacity-0 cursor-pointer" style={{width:'calc(100%+8px)', height:'calc(100%+8px)'}} />
                      <div className="absolute inset-0 pointer-events-none" style={{background: bgColor1}} />
                    </div>
                    <input type="range" min="0" max="1" step="0.01" value={colorRatio}
                      onChange={e => setColorRatio(parseFloat(e.target.value))}
                      style={{flex:1, height:'6px', background: `linear-gradient(to right, ${bgColor1}, ${bgColor2})`, borderRadius:'3px'}} />
                    <div className="relative" style={{width:'32px', height:'24px', borderRadius:'8px', border:'1.5px solid #E0E0E0', overflow:'hidden', flexShrink:0}}>
                      <input type="color" value={bgColor2} onChange={e => setBgColor2(e.target.value)}
                        className="absolute -inset-1 opacity-0 cursor-pointer" style={{width:'calc(100%+8px)', height:'calc(100%+8px)'}} />
                      <div className="absolute inset-0 pointer-events-none" style={{background: bgColor2}} />
                    </div>
                  </div>
                  {palette.length > 0 && (
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                      <div style={{display:'flex', gap:'5px', flexWrap:'wrap'}}>
                        {palette.map((c, i) => (
                          <button key={i} onClick={() => { if (i === 0 || i % 2 === 0) setBgColor1(c); else setBgColor2(c); }} title={c}
                            style={{width:'18px', height:'18px', flexShrink:0, background:c, borderRadius:'6px', border: (bgColor1 === c || bgColor2 === c) ? '2px solid #F26451' : '2px solid transparent', cursor:'pointer', transition:'all 0.2s', transform: (bgColor1 === c || bgColor2 === c) ? 'scale(1.1)' : 'scale(1)'}}
                            onMouseEnter={e => { if (bgColor1 !== c && bgColor2 !== c) e.target.style.borderColor = '#D0CDC8'; }}
                            onMouseLeave={e => { if (bgColor1 !== c && bgColor2 !== c) e.target.style.borderColor = 'transparent'; }} />
                        ))}
                      </div>
                      <button onClick={randomFromPalette}
                        style={{fontSize:'11px', color:'#7A7A7A', background:'none', border:'none', cursor:'pointer', transition:'color 0.2s', whiteSpace:'nowrap', padding:'2px 6px'}}
                        onMouseEnter={e => e.target.style.color='#F26451'}
                        onMouseLeave={e => e.target.style.color='#7A7A7A'}>
                        {t.random}
                      </button>
                    </div>
                  )}
                </Section>

                {/* Card 7 — Export */}
                <div style={{background:'#FAFAF8', borderRadius:'14px', padding:'11px 14px', boxShadow:'0 1px 2px rgba(0,0,0,0.03)'}}>
                  <div style={{display:'flex', gap:'8px'}}>
                    <button onClick={exportPng} disabled={isExporting}
                      style={{flex:1, padding:'13px 0', color:'#FFFFFF', fontSize:'12px', fontWeight:600, letterSpacing:'0.05em', background:'#F26451', border:'none', borderRadius:'14px', cursor:'pointer', transition:'all 0.2s', opacity: isExporting ? 0.5 : 1}}
                      onMouseEnter={e => { if (!isExporting) e.target.style.background='#E55343'; }}
                      onMouseLeave={e => { if (!isExporting) e.target.style.background='#F26451'; }}>
                      {t.exportBtn}
                    </button>
                    <button onClick={exportVideo} disabled={isExporting}
                      style={{flex:1, padding:'13px 0', color:'#FFFFFF', fontSize:'12px', fontWeight:600, letterSpacing:'0.05em', background:'#2D2D2D', border:'none', borderRadius:'14px', cursor:'pointer', transition:'all 0.2s', opacity: isExporting ? 0.5 : 1}}
                      onMouseEnter={e => { if (!isExporting) e.target.style.background='#3D3D3D'; }}
                      onMouseLeave={e => { if (!isExporting) e.target.style.background='#2D2D2D'; }}>
                      {isExporting ? t.recording : t.exportVideoBtn}
                    </button>
                  </div>
                  <p style={{fontSize:'11px', color:'#B0B0B0', textAlign:'center', marginTop:'8px', marginBottom:0}}>
                    {t.exportNote}
                  </p>
                </div>

              </div>
            )}
              </div>
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
